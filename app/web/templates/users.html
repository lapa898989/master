<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Users</title>
    <style>
      body { font-family: Arial, sans-serif; padding: 24px; }
      table { border-collapse: collapse; width: 100%; }
      th, td { border: 1px solid #ddd; padding: 8px; font-size: 12px; }
      th { background: #f5f5f5; }
      .muted { color: #666; }
    </style>
  </head>
  <body>
    <h2>Users</h2>
    <div class="muted"><a href="/admin">Back</a></div>
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>tg_id</th>
          <th>role</th>
          <th>name</th>
          <th>phone</th>
          <th>city</th>
          <th>rating</th>
          <th>completed</th>
          <th>banned</th>
          <th>action</th>
        </tr>
      </thead>
      <tbody>
      {% for u in users %}
        <tr>
          <td>{{ u.id }}</td>
          <td>{{ u.tg_id }}</td>
          <td>{{ u.role }}</td>
          <td>{{ u.name }}</td>
          <td>{{ u.phone }}</td>
          <td>{{ u.city }}</td>
          <td>{{ "%.2f"|format(u.rating) }}</td>
          <td>{{ u.completed_tasks }}</td>
          <td>{{ u.is_banned }}</td>
          <td>
            <form method="post" action="/admin/users/{{ u.id }}/ban">
              <input type="hidden" name="is_banned" value="{% if u.is_banned %}false{% else %}true{% endif %}" />
              <button type="submit">{% if u.is_banned %}Unban{% else %}Ban{% endif %}</button>
            </form>
          </td>
        </tr>
      {% endfor %}
      </tbody>
    </table>
  </body>
</html>

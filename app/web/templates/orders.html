<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Orders</title>
    <style>
      body { font-family: Arial, sans-serif; padding: 24px; }
      table { border-collapse: collapse; width: 100%; }
      th, td { border: 1px solid #ddd; padding: 8px; font-size: 12px; }
      th { background: #f5f5f5; }
      .muted { color: #666; }
    </style>
  </head>
  <body>
    <h2>Orders</h2>
    <div class="muted"><a href="/admin">Back</a></div>
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>customer_id</th>
          <th>category_id</th>
          <th>status</th>
          <th>price</th>
          <th>currency</th>
          <th>address</th>
          <th>created_at</th>
        </tr>
      </thead>
      <tbody>
      {% for o in orders %}
        <tr>
          <td>{{ o.id }}</td>
          <td>{{ o.customer_id }}</td>
          <td>{{ o.category_id }}</td>
          <td>{{ o.status }}</td>
          <td>{{ o.price }}</td>
          <td>{{ o.currency }}</td>
          <td>{{ o.address }}</td>
          <td>{{ o.created_at }}</td>
        </tr>
      {% endfor %}
      </tbody>
    </table>
  </body>
</html>

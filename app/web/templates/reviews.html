<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Reviews</title>
    <style>
      body { font-family: Arial, sans-serif; padding: 24px; }
      table { border-collapse: collapse; width: 100%; }
      th, td { border: 1px solid #ddd; padding: 8px; font-size: 12px; }
      th { background: #f5f5f5; }
      .muted { color: #666; }
    </style>
  </head>
  <body>
    <h2>Reviews</h2>
    <div class="muted"><a href="/admin">Back</a></div>
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>order_id</th>
          <th>from</th>
          <th>to</th>
          <th>rating</th>
          <th>comment</th>
          <th>created_at</th>
          <th>action</th>
        </tr>
      </thead>
      <tbody>
      {% for r in reviews %}
        <tr>
          <td>{{ r.id }}</td>
          <td>{{ r.order_id }}</td>
          <td>{{ r.from_user_id }}</td>
          <td>{{ r.to_user_id }}</td>
          <td>{{ r.rating }}</td>
          <td>{{ r.comment }}</td>
          <td>{{ r.created_at }}</td>
          <td>
            <form method="post" action="/admin/reviews/{{ r.id }}/delete">
              <button type="submit">Delete</button>
            </form>
          </td>
        </tr>
      {% endfor %}
      </tbody>
    </table>
  </body>
</html>

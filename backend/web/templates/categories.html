<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Categories</title>
    <style>
      body { font-family: Arial, sans-serif; padding: 24px; }
      table { border-collapse: collapse; width: 100%; margin-top: 12px; }
      th, td { border: 1px solid #ddd; padding: 8px; font-size: 12px; }
      th { background: #f5f5f5; }
      .muted { color: #666; }
    </style>
  </head>
  <body>
    <h2>Categories</h2>
    <div class="muted"><a href="/admin">Back</a></div>

    <h3>Add</h3>
    <form method="post" action="/admin/categories/add">
      <input name="name" placeholder="Name" required />
      <input name="icon" placeholder="Icon" />
      <input name="sort_order" placeholder="Sort" type="number" value="0" />
      <button type="submit">Add</button>
    </form>

    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>name</th>
          <th>icon</th>
          <th>sort</th>
          <th>active</th>
          <th>action</th>
        </tr>
      </thead>
      <tbody>
      {% for c in categories %}
        <tr>
          <td>{{ c.id }}</td>
          <td>{{ c.name }}</td>
          <td>{{ c.icon }}</td>
          <td>{{ c.sort_order }}</td>
          <td>{{ c.is_active }}</td>
          <td>
            <form method="post" action="/admin/categories/{{ c.id }}/toggle">
              <button type="submit">{% if c.is_active %}Disable{% else %}Enable{% endif %}</button>
            </form>
          </td>
        </tr>
      {% endfor %}
      </tbody>
    </table>
  </body>
</html>

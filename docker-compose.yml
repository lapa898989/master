services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: serviceindriver
      POSTGRES_USER: serviceindriver
      POSTGRES_PASSWORD: serviceindriver
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  app:
    build: .
    env_file:
      - .env
    depends_on:
      - db
      - redis
    ports:
      - "8000:8000"
    command: >
      sh -c "
      alembic upgrade head &&
      python -m app
      "

volumes:
  db_data:

